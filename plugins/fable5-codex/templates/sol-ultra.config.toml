# Copy these settings into ~/.codex/config.toml or a trusted repo's .codex/config.toml.
model = "gpt-5.6-sol"
model_reasoning_effort = "ultra"

[agents]
# Codex defaults to six concurrently open agent threads. Keep that cap and
# prevent recursive fan-out; Fable prompts assign only the lenses a task needs.
max_threads = 6
max_depth = 1
